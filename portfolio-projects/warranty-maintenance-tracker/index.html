<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Warranty & Maintenance Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Warranty & Maintenance Tracker</h1>
    <p class="intro">Enter purchased item, warranty, and maintenance information below.</p>

    <form id="trackerForm" action="save_item.php" method="POST">

      <label for="itemName">Item Name *</label>
      <input type="text" id="itemName" name="itemName" placeholder="Example: HP Laptop">

      <label for="category">Category *</label>
      <select id="category" name="category">
        <option value="">Select a category</option>
        <option>Electronics</option>
        <option>Appliances</option>
        <option>Vehicle</option>
        <option>Furniture</option>
        <option>Tools</option>
        <option>Other</option>
      </select>

      <label for="brand">Brand</label>
      <input type="text" id="brand" name="brand" placeholder="Example: HP">

      <label for="purchaseDate">Purchase Date *</label>
      <input type="date" id="purchaseDate" name="purchaseDate">

      <label for="price">Purchase Price *</label>
      <input type="number" id="price" name="price" step="0.01" placeholder="Example: 799.99">

      <label for="provider">Warranty Provider</label>
      <input type="text" id="provider" name="provider" placeholder="Example: Best Buy Protection">

      <label for="warrantyEnd">Warranty End Date *</label>
      <input type="date" id="warrantyEnd" name="warrantyEnd">

      <label for="maintenanceDate">Next Maintenance Date</label>
      <input type="date" id="maintenanceDate" name="maintenanceDate">

      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" placeholder="Enter warranty or maintenance notes"></textarea>

      <button type="submit">Save Item</button>
      <button type="reset" class="clear">Clear Form</button>
    </form>

    <div id="message"></div>

    <h2>Saved Item Preview</h2>

    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Category</th>
          <th>Brand</th>
          <th>Purchase Date</th>
          <th>Price</th>
          <th>Warranty Ends</th>
          <th>Maintenance</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="itemTable"></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
